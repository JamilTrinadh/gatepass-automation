spring:
  application:
    name: gatepass-automation

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

gatepass:
  automation:
    download-dir: /Users/jamiltrinadh/Desktop/projects/gatepass-automation/downloads/gatepasses/
    portal-url: ${GATEPASS_PORTAL_URL}
    headless: ${PLAYWRIGHT_HEADLESS:false}
    admin-username: ${ADMIN_USERNAME}
    admin-password: ${ADMIN_PASSWORD}

microsoft:
  tenant-id: ${MICROSOFT_TENANT_ID:8ea45869-4a2f-4af3-a2da-95e8d09c1039}
  client-id: ${MICROSOFT_CLIENT_ID:9b80552d-2f2c-4225-94e3-4cf47635d84b}
  client-secret: ${MICROSOFT_CLIENT_SECRET}